name: Install-DotNet
description: Installs .NET Framework and ASP.NET features required to host the .NET API
schemaVersion: 1.0
phases:
  - name: build
    steps:
      - name: InstallDotNet
        action: ExecutePowerShell
        inputs:
          commands:
            - Install-WindowsFeature -Name NET-Framework-45-ASPNET,Web-Asp-Net45
