version: 0.0
os: linux
files:
  - source: /app
    destination: /var/www/dotnet-app/app
  - source: /scripts
    destination: /var/www/dotnet-app/scripts
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 60
      runas: root
  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 90
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 120
      runas: root
