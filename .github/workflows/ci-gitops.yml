name: CI - Build, Deploy .NET + GitOps

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPO: 700800570325.dkr.ecr.ap-south-1.amazonaws.com/dev-gitops-app
  GITOPS_REPO: vicky-929/aws-devops-gitops-manifests
  CODEDEPLOY_APP: dev-dotnet-app
  CODEDEPLOY_GROUP: dev-dotnet-app-dg

jobs:
  # ── Job 1: GitOps Docker build for EKS (Task 2) ───────────────────────────
  build-and-push-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REPO:$IMAGE_TAG .
          docker push $ECR_REPO:$IMAGE_TAG
          docker tag $ECR_REPO:$IMAGE_TAG $ECR_REPO:latest
          docker push $ECR_REPO:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update image tag in GitOps repo
        run: |
          cd gitops-repo
          sed -i "s|tag:.*|tag: ${{ env.IMAGE_TAG }}|" apps/gitops-app/values.yaml
          git config user.email "ci-bot@devops.com"
          git config user.name "CI Bot"
          git add apps/gitops-app/values.yaml
          git commit -m "ci: update image tag to ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push

  # ── Job 2: Build .NET app + deploy via CodeDeploy (Task 1) ────────────────
  build-and-deploy-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build and publish .NET app
        run: |
          cd dotnet-app
          dotnet publish -c Release -r linux-x64 \
            --self-contained true -o ./publish

      - name: Package artifact for CodeDeploy
        run: |
          mkdir -p codedeploy-package/app
          # Copy published binary into app/ subfolder
          cp -r dotnet-app/publish/* codedeploy-package/app/
          # appspec.yml and scripts MUST be at root of zip
          cp dotnet-app/appspec.yml codedeploy-package/
          cp -r dotnet-app/scripts codedeploy-package/
          # Zip with appspec.yml at root
          cd codedeploy-package
          zip -r ../dotnet-app-${{ github.sha }}.zip .
          cd ..
          # Verify appspec is at root of zip
          unzip -l dotnet-app-${{ github.sha }}.zip | grep appspec

      - name: Get S3 bucket name
        run: |
          BUCKET=$(aws s3api list-buckets \
            --query "Buckets[?contains(Name,'codepipeline-artifacts')].Name" \
            --output text)
          echo "S3_BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "Using bucket: $BUCKET"

      - name: Upload artifact to S3
        run: |
          aws s3 cp dotnet-app-${{ github.sha }}.zip \
            s3://${{ env.S3_BUCKET }}/dotnet-app-${{ github.sha }}.zip

      - name: Trigger CodeDeploy deployment
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APP }} \
            --deployment-group-name ${{ env.CODEDEPLOY_GROUP }} \
            --s3-location bucket=${{ env.S3_BUCKET }},key=dotnet-app-${{ github.sha }}.zip,bundleType=zip \
            --region ${{ env.AWS_REGION }} \
            --query "deploymentId" \
            --output text)
          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Wait for deployment result
        run: |
          aws deploy wait deployment-successful \
            --deployment-id ${{ env.DEPLOYMENT_ID }} \
            --region ${{ env.AWS_REGION }}
          echo "Deployment succeeded!"
