name: CI - Build and Deploy via GitOps

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPO: 700800570325.dkr.ecr.ap-south-1.amazonaws.com/dev-gitops-app
  GITOPS_REPO: vicky-929/aws-devops-gitops-manifests

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REPO:$IMAGE_TAG .
          docker push $ECR_REPO:$IMAGE_TAG
          docker tag $ECR_REPO:$IMAGE_TAG $ECR_REPO:latest
          docker push $ECR_REPO:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Update image tag in Helm values
        run: |
          cd gitops-repo
          sed -i "s|tag:.*|tag: ${{ env.IMAGE_TAG }}|" apps/gitops-app/values.yaml
          git config user.email "ci-bot@devops.com"
          git config user.name "CI Bot"
          git add apps/gitops-app/values.yaml
          git commit -m "ci: update image tag to ${{ env.IMAGE_TAG }}"
          git push
